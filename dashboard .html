<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-Machine MQTT Dashboard</title>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #f1f5f9;
      letter-spacing: 0.5px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 18px;
      font-size: 12px;
      color: #94a3b8;
    }

    .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #475569;
      flex-shrink: 0;
    }
    .status-dot.connected { background: #22c55e; }
    .status-dot.error     { background: #ef4444; }

    .grid-main { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; align-items: start; }

    .machine-card {
      background: #1e2332;
      border-radius: 10px;
      border: 1px solid #2d3748;
      overflow: hidden;
    }

    .card-header {
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .card-header .machine-status {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(255,255,255,0.2);
    }

    .subtopic-block {
      padding: 5px 10px;
      border-bottom: 1px solid #2d3748;
    }
    .subtopic-block:last-child { border-bottom: none; }

    .subtopic-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #64748b;
      margin-bottom: 3px;
    }

    /* Each kv pair on its own line */
    .kv-row {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .kv {
      font-size: 10.5px;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
      gap: 4px;
      padding: 1px 0;
    }

    .kv .kv-key {
      color: #64748b;
      flex-shrink: 0;
      max-width: 55%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .kv b {
      color: #e2e8f0;
      font-weight: 600;
      text-align: right;
      word-break: break-word;
    }
    .kv b.ok    { color: #22c55e; }
    .kv b.warn  { color: #f59e0b; }
    .kv b.alarm { color: #ef4444; }
    .kv b.hi    { color: #60a5fa; }

    .progress-bar {
      height: 4px; background: #2d3748;
      border-radius: 2px; margin-top: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: #2563eb;
      border-radius: 2px; transition: width 0.4s ease;
    }
  </style>
</head>
<body>

  <h1>Multi-Machine MQTT Live Dashboard</h1>
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connecting to server...</span>
    <span id="msgCount" style="margin-left:12px;">Messages: 0</span>
  </div>

  <div class="grid-main" id="main-grid"></div>

  <script>
  // -------------------------------------------------------------------------
  // Machine type definitions
  // -------------------------------------------------------------------------
  const MACHINE_DEFS = {
    ASRS: { label: 'ASRS',               color: '#2563eb', subtopics: ['telemetry','alarm','health','task','storage','performance','order','integration'] },
    CNC:  { label: 'CNC',                color: '#7c3aed', subtopics: ['telemetry','alarm','health'] },
    IMM:  { label: 'Injection Moulding', color: '#db2777', subtopics: ['telemetry','alarm','health','cycle_breakdown','integration','production'] },
    LC:   { label: 'Laser Cutter',       color: '#dc2626', subtopics: ['telemetry','alarm','health','cutting','quality','integration'] },
    MR:   { label: 'Mobile Robot',       color: '#059669', subtopics: ['telemetry','alarm','fleet','navigation','sensor','task','integration'] },
    PM:   { label: 'Packaging Machine',  color: '#d97706', subtopics: ['telemetry','alarm','health','quality','production','batch','integration'] },
    QI:   { label: 'Quality Inspection', color: '#0891b2', subtopics: ['telemetry','defect','feedback','integration','measurement','quality'] },
    RA:   { label: 'Robotic Arm',        color: '#9333ea', subtopics: ['telemetry','alarm','health','path','task','integration'] },
    SM:   { label: 'Strapping Machine',  color: '#b45309', subtopics: ['telemetry','alarm','health','dispatch','production','integration','quality'] },
    VI:   { label: 'Vision Inspection',  color: '#0f766e', subtopics: ['telemetry','ai_inference','defect','feedback','image','integration','quality'] },
  };

  const SUBTOPIC_ICONS = {
    telemetry:'📡', alarm:'🔔', health:'💚', task:'📋', storage:'📦',
    performance:'📈', order:'🛒', integration:'🔗', cycle_breakdown:'🔄',
    production:'🏭', cutting:'✂️', quality:'✅', fleet:'🚗', navigation:'🗺️',
    sensor:'📻', batch:'📑', dispatch:'📤', defect:'❌', feedback:'🔁',
    measurement:'📏', path:'🛤️', ai_inference:'🤖', image:'🖼️',
  };

  const MACHINES = [
    { id:'ASRS_01', type:'ASRS' },
    { id:'CNC_01',  type:'CNC'  }, { id:'IMM_01', type:'IMM' }, { id:'LC_01', type:'LC'  },
    { id:'MR_01',   type:'MR'   }, { id:'PM_01',  type:'PM'  }, { id:'QI_01', type:'QI'  },
    { id:'RA_01',   type:'RA'   }, { id:'SM_01',  type:'SM'  }, { id:'VI_01', type:'VI'  },
  ];

  // -------------------------------------------------------------------------
  // Build card DOM
  // -------------------------------------------------------------------------
  const mainGrid = document.getElementById('main-grid');

  for (const { id: mid, type } of MACHINES) {
    const def  = MACHINE_DEFS[type];
    const card = document.createElement('div');
    card.className = 'machine-card';
    card.id = `card_${mid}`;

    const blocks = def.subtopics.map(sub => {
      const icon  = SUBTOPIC_ICONS[sub] || '•';
      const label = sub.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      return `
        <div class="subtopic-block" id="${mid}_${sub}_block">
          <div class="subtopic-label">${icon} ${label}</div>
          <div class="kv-row" id="${mid}_${sub}_kv"><span class="kv"><span class="kv-key">--</span><b>--</b></span></div>
        </div>`;
    }).join('');

    card.innerHTML = `
      <div class="card-header" style="background:${def.color}">
        ${mid}
        <span class="machine-status" id="${mid}_status">--</span>
      </div>
      ${blocks}`;

    mainGrid.appendChild(card);
  }

  // -------------------------------------------------------------------------
  // DOM helpers
  // -------------------------------------------------------------------------
  let msgCount = 0;

  function setKV(mid, sub, rows) {
    const el = document.getElementById(`${mid}_${sub}_kv`);
    if (!el) return;
    el.innerHTML = rows.map(([k, v, cls]) =>
      `<span class="kv"><span class="kv-key" title="${k}">${k}</span><b class="${cls || ''}">${v ?? '--'}</b></span>`
    ).join('');
  }

  function setStatus(mid, status) {
    const el = document.getElementById(`${mid}_status`);
    if (el) el.textContent = status || '--';
  }

  function setProgress(mid, sub, pct) {
    const block = document.getElementById(`${mid}_${sub}_block`);
    if (!block) return;
    let bar = block.querySelector('.progress-bar');
    if (!bar) {
      bar = document.createElement('div');
      bar.className = 'progress-bar';
      bar.innerHTML = `<div class="progress-fill" style="width:0%"></div>`;
      block.appendChild(bar);
    }
    bar.querySelector('.progress-fill').style.width = `${Math.min(100, pct)}%`;
  }

  function healthCls(s) {
    if (s == null || s === '--') return '';
    return s >= 85 ? 'ok' : s >= 70 ? 'warn' : 'alarm';
  }
  function sevCls(s) {
    if (!s) return '';
    const u = s.toUpperCase();
    return u === 'HIGH' ? 'alarm' : u === 'MEDIUM' ? 'warn' : 'ok';
  }

  // -------------------------------------------------------------------------
  // Smart color picker based on key path and value
  // -------------------------------------------------------------------------
  const STATUS_OK  = new Set(['ACTIVE','RUNNING','MOVING','CONNECTED','OK','PASS','COMPLETED','IDLE','ONLINE','ENABLED']);
  const STATUS_ALARM = new Set(['ERROR','FAULT','FAILED','EMERGENCY','STOPPED','OFFLINE','CRITICAL']);

  function colorFor(keyPath, val) {
    const k = keyPath.toLowerCase();
    const lastKey = k.split('.').pop().replace(/\[\d+\]/, '');

    if (typeof val === 'boolean') {
      const isBadKey = /emergency|fault|error|stop|fail|alarm|collision/.test(k);
      const isGoodKey = /active|connected|enabled|running|online|charging/.test(k);
      if (isBadKey)  return val ? 'alarm' : 'ok';
      if (isGoodKey) return val ? 'ok'    : 'warn';
      return '';
    }

    if (typeof val === 'number') {
      if (/health|score|battery|chargepercent|util|occupancy/.test(k)) return healthCls(val);
      if (/temperature|temp/.test(k) && val > 80) return val > 95 ? 'alarm' : 'warn';
      if (/alarm|fault|error|warning/.test(k) && Number.isInteger(val)) return val > 0 ? 'alarm' : 'ok';
      if (/progresspercent|percent|pct/.test(k)) return 'hi';
      return '';
    }

    if (typeof val === 'string') {
      const u = val.toUpperCase();
      if (lastKey === 'status' || lastKey === 'state') {
        if (STATUS_OK.has(u))    return 'ok';
        if (STATUS_ALARM.has(u)) return 'alarm';
        return 'warn';
      }
      if (/severity/.test(k))          return sevCls(val);
      if (/result|outcome/.test(k))    return u === 'PASS' ? 'ok' : u === 'FAIL' ? 'alarm' : 'warn';
      if (/priority/.test(k))          return u === 'HIGH' ? 'alarm' : u === 'MEDIUM' ? 'warn' : 'ok';
      if (/code/.test(k) && u === 'NONE') return 'ok';
      if (u === 'HIGH')   return 'alarm';
      if (u === 'MEDIUM') return 'warn';
      if (u === 'LOW')    return 'ok';
    }
    return '';
  }

  // -------------------------------------------------------------------------
  // Universal recursive flattener — emits every leaf as a [key, value, color] row
  // -------------------------------------------------------------------------
  const SKIP_KEYS = new Set(['subscribed_topic', 'timestamp', 'asrsId', 'machineId',
                              'robotId', 'inspectionId', 'plantId', 'stationId']);

  function flattenObj(obj, prefix, rows) {
    for (const [k, v] of Object.entries(obj)) {
      if (SKIP_KEYS.has(k)) continue;
      const path = prefix ? `${prefix}.${k}` : k;

      if (Array.isArray(v)) {
        if (v.length === 0) {
          rows.push([path, '(empty)', 'hi']);
        } else if (typeof v[0] === 'object' && v[0] !== null) {
          // Array of objects — expand each element
          for (let i = 0; i < v.length; i++) {
            flattenObj(v[i], `${path}[${i}]`, rows);
          }
        } else {
          // Array of primitives — join into a single row
          rows.push([path, v.join(', '), 'hi']);
        }
      } else if (typeof v === 'object' && v !== null) {
        flattenObj(v, path, rows);
      } else {
        const display = v == null ? '--' : String(v);
        rows.push([path, display, colorFor(path, v)]);
      }
    }
  }

  // -------------------------------------------------------------------------
  // Universal renderer — replaces all specific R[] entries
  // -------------------------------------------------------------------------
  function universalRender(mid, d, sub) {
    // Update header status badge from telemetry
    if (sub === 'telemetry' && d.status != null) {
      setStatus(mid, d.status);
    }

    const rows = [];
    flattenObj(d, '', rows);

    // Show progress bar if payload contains a progress percent
    const progRow = rows.find(([k]) => /progresspercent/i.test(k));
    if (progRow) {
      const pct = parseFloat(progRow[1]);
      if (!isNaN(pct)) setProgress(mid, sub, pct);
    }

    if (!rows.length) rows.push(['--', '--', '']);
    setKV(mid, sub, rows);
  }

  // -------------------------------------------------------------------------
  // Socket.IO — receive MQTT data from server.py
  // -------------------------------------------------------------------------
  const socket = io('http://127.0.0.1:5001', { transports: ['websocket', 'polling'] });

  socket.on('connect', () => {
    document.getElementById('statusDot').className   = 'status-dot connected';
    document.getElementById('statusText').textContent = 'Connected to server (port 5001)';
  });

  socket.on('disconnect', () => {
    document.getElementById('statusDot').className   = 'status-dot error';
    document.getElementById('statusText').textContent = 'Disconnected from server';
  });

  socket.on('connect_error', err => {
    document.getElementById('statusDot').className   = 'status-dot error';
    document.getElementById('statusText').textContent = 'Connection error: ' + err.message;
  });

  socket.on('mqtt_data', data => {
    const topic = data.subscribed_topic || '';
    const match = topic.match(/^machine\/([^/]+)\/(.+)$/);
    if (!match) return;

    const machineId = match[1];   // e.g. "ASRS_01"
    const subtopic  = match[2];   // e.g. "telemetry", "cycle_breakdown"

    universalRender(machineId, data, subtopic);

    msgCount++;
    document.getElementById('msgCount').textContent = `Messages: ${msgCount}`;
  });
  </script>
</body>
</html>
